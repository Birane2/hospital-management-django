{% include 'base.html' %}
{% load static %}
{% include 'navigation.html' %}

<head>
    <title>Ajouter un patient</title>
</head>
<body>
    <div class="container form-page">
    <h1 class="page-heading">Ajouter un patient</h1>

    <form method="post">
        {% csrf_token %}
        <label for="name">Nom :</label>
        <input type="text" name="name" class="form-control form-control-sm" required><br>
        <label for="gender">Genre :</label>
        <select name="gender" class="form-control form-control-sm" required>
            <option value="M">Homme</option>
            <option value="F">Femme</option>
            <option value="O">Autre</option>
        </select><br>
        <label for="age">Âge :</label>
        <input type="number" name="age" class="form-control form-control-sm" required><br>
        <label for="address">Adresse :</label>
        <textarea name="address" class="form-control form-control-sm" required></textarea><br>
        <input type="submit" value="Ajouter" class="btn btn-primary px-4">
    </form>
    </div>

</body>
